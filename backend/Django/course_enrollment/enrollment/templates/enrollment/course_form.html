{% extends "enrollment/base.html" %}
{% block content %}
<h1>Add a New Course</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{% url 'list_courses' %}" class="btn btn-secondary">Back</a>
</form>
{% endblock %}
