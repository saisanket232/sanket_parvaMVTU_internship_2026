{% extends 'enrollment/base.html' %}

{% block content %}
<h1 class="text-danger bg-warning text-center p-3">Student List</h1>
<table class="table table-striped table-warning table-bordered table-hover">
    <thead>
        <tr>
            <th>Name of the Course</th>
            <th>Description</th>
            <th>Duration</th>
            <th>Fees</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for course in courses %}
        <tr>
            <td>{{ course.name }}</td>
            <td>{{ course.description }}</td>
            <td>{{ course.duration }}</td>
            <td>{{ course.fees }}</td>
            <td>
                <a class="btn btn-warning" href="{% url 'edit_course' course.id %}">Edit</a>
                <a class="btn btn-danger" href="{% url 'delete_course' course.id %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
