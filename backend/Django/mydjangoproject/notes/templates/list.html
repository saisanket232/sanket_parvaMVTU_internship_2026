{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>All Notes</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">

    <h1>All Notes</h1>

    <a href="/notes/create/" class="add-btn">+ Add Note</a>

    <div class="notes-wrapper">
        {% for note in notes %}
            <div class="note-card">
                <h3>{{ note.title }}</h3>
                <p>{{ note.content }}</p>

                <a href="/notes/delete/{{ note.id }}/" class="delete-btn">Delete</a>
            </div>
        {% empty %}
            <p>No notes available</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
