<!DOCTYPE html>
<html>
<head><title>Employee Registration</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
  <h2>Employee Registration</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
      <button type="submit" class="btn btn-add">Register</button>
  </form>
  <div class="btn-center">
    <a href="{% url 'employee_list' %}" class="btn btn-add">View All Employees</a>
  </div>
</div>
</body>
</html>
