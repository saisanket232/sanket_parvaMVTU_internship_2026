<!DOCTYPE html>
<html>
<head>
    <title>Delete Employee</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">
    <h1>Delete Employee</h1>
    <p>Are you sure you want to delete <strong>{{ employee.name }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">Yes, Delete</button>
        <a href="{% url 'employee_list' %}" class="btn btn-add">Cancel</a>
    </form>
</div>
</body>
</html>
