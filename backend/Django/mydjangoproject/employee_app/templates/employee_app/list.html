<!DOCTYPE html>
<html>
<head>
  <title>Employee List</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">
  <h2>All Employees</h2>
  
  <form method="GET" style="margin-bottom: 20px;">
    <input type="text" name="q" placeholder="Search by name" 
           value="{{ request.GET.q }}" 
           style="padding: 8px; width: 250px;">
    
    <button type="submit" class="btn btn-primary">Search</button>
</form>
  <table border="1">
    <tr>
      <th>Name</th><th>Email</th><th>Phone</th>
      <th>Department</th><th>Salary</th><th>Joined</th>
      <th>Actions</th>
    </tr>
    {% for emp in employees %}
    <tr>
      <td>{{ emp.name }}</td>
      <td>{{ emp.email }}</td>
      <td>{{ emp.phone }}</td>
      <td>{{ emp.department }}</td>
      <td>{{ emp.salary }}</td>
      <td>{{ emp.joined_date }}</td>
      <td>
        <a href="{% url 'employee_edit' emp.pk %}" class="btn btn-edit">Edit</a>
        <a href="{% url 'employee_delete' emp.pk %}" class="btn btn-delete">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="7">No employees found.</td>
    </tr>
    {% endfor %}
  </table>
  <div class="btn-center">
    <a href="{% url 'register_employee' %}" class="btn btn-add">Register New Employee</a>
  </div>
</div>
</body>
</html>
