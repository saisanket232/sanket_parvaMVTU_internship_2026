<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types</title>
</head>
<body>
    <h2>Data Types</h2>
    <h4>1.Number</h4>
    <h4>2.String</h4>
    <h4>3.Boolean</h4>
    <h4>4.Null</h4>
    <h4>5.Undefined</h4>
    <h4>6.Object</h4>
    <h4>7.BigInt</h4>
    <script>
        let num=69;
        console.log("The Num Is :",num);
        console.log("The typeof Num is :",typeof num);

        let str='Karatagi';
        console.log('The City Is :',str);
        console.log("The typeof Is :",typeof str);

        let isStudent=true;
        console.log("Is Student :",isStudent);
        console.log("The typeof Is :",typeof isStudent);
    </script>
</body>
</html>
