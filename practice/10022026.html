<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task2</title>
</head>
<body>
    <h2>Calculator</h2>
    <label for="num1">First Number:</label>
    <input type="number" id="num1" placeholder="First number">
<br>
<select  id="operator">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
</select><br>
<label for="num2">Second Number:</label>
<input type="number" id="num2" placeholder="Second number"><br>
<button id="calcBtn">Calculate</button><br>
<div id="answer"></div>

<script>
    const calcBtn=document.getElementById("calcBtn");
    const answer=document.getElementById("answer");

    calcBtn.addEventListener("click",(e)=>{
        const num1 = Number(document.getElementById("num1").value);
    const num2 = Number(document.getElementById("num2").value);
    const operator = document.getElementById("operator").value;

        if(isNaN(num1) || document.getElementById("num1").value === ""){
            alert("INVALID");return;
        }
        if(isNaN(num1) || document.getElementById("num2").value === ""){
            alert("INVALID");return;
        }
    let res;

switch(operator) {
    case "+":
        res = num1 + num2;
        break;
    case "-":
        res = num1 - num2;
        break;
    case "*":
        res = num1 * num2;
        break;
    case "/":
        if (num2 !== 0) {
    res = num1 / num2;
} else {
    answer.innerHTML = "Cannot divide by zero";
    return;
}

        break;
}


answer.innerHTML="The Result is: " + res;
    })

</script>
</body>
</html>
