<body>
    <h1>Operators</h1>
    <h2>Operators in JavaScript</h2>

<pre>
1. Arithmetic Operators  : + - * / % **
2. Assignment Operators  : = += -= *= %=
3. Comparison Operators  : == === != !== > < >= <=
4. Logical Operators     : && || !
5. Bitwise Operators     : & | ^ ~ << >> >>>

<!-- ==   → compares value only
===  → compares value AND type -->
</pre>
    <p id="demo"></p>
    <script>

        // console.log("type of marks2:", typeof marks2);
        // console.log("marks1==marks2:", marks1==marks2);
        // console.log("marks1===marks2:", marks1===marks2);

        let x = true;
let y = x &&= 10;

document.getElementById("demo").innerHTML = "Value of y is: " + y;
        </script>
