<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Premitive and Reference Types in JavaScript</h1>


    <script>
        let x = 40;
        let y = x;
        console.log(`Before changing x: ${x}`);
        console.log(`Before changing y: ${y}`);
        x = 50;
        console.log(`After changing x: ${x}`);
        console.log(`After changing y: ${y}`);

        const arr = [1, 2, 3, 4];
        const arr2 = arr;
        console.log(`Before changing value: arr: ${arr}`);
        console.log(`Before changing value: arr2: ${arr2}`);
        arr.push(5);
        console.log(`After changing value: arr: ${arr}`);
        console.log(`After changing value: arr2: ${arr2}`);
        
    </script>
</body>
</html>
