<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="student.css">
</head>

<body>

<h2 class="text-center mt-4">Student Details</h2>

<div class="container mt-4">
<div class="row justify-content-center">
<div class="col-md-6 col-lg-6 col-sm-12">

<h4 class="text-center mt-4">Student Registration Form</h4>

<form id="sform">

<label for="name">Name:</label>
<input type="text" id="name" class="form-control mb-2">

<label for="email">Email:</label>
<input type="email" id="email" class="form-control mb-2">

<label for="number">Phone Number:</label>
<input type="tel" id="number" class="form-control mb-2">

<label for="course">Course:</label>
<select id="course" class="form-control mb-2">
<option value="">Select a course</option>
<option value="Computer Science">Computer Science</option>
<option value="Mathematics">Mathematics</option>
<option value="Physics">Physics</option>
</select>

<label>Gender:</label><br>

<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other

<br><br>

<label>Skills:</label><br>

<input type="checkbox" name="skills" value="HTML"> HTML
<input type="checkbox" name="skills" value="CSS"> CSS
<input type="checkbox" name="skills" value="JavaScript"> JavaScript

<br><br>

<label for="address">Address:</label>
<textarea id="address" class="form-control mb-3"></textarea>

<button type="submit" class="btn btn-primary center">Submit</button>

</form>

<div id="display" class="mt-4"></div>

</div>
</div>
</div>

<script src="student.js"></script>

</body>
</html>
